<div class="dashboard-container">
  <div class="predictor-card">

    <div class="card-header">
      <h2>Crop Pattern Prediction</h2>
      <p>ML based crop pattern analysis and prediction</p>
    </div>

    <label>Crop</label>

<select [(ngModel)]="userInput.crop" name="crop">
  <option value="">Select Crop</option>

  <option *ngFor="let crop of crops"
          [value]="crop">
    {{ crop }}
  </option>

</select>
    

    <label>Season</label>

<select [(ngModel)]="userInput.season" name="season">

  <option value="">Select Season</option>

  <option *ngFor="let season of seasons"
          [value]="season">
    {{ season }}
  </option>

</select>
    
    <div class="input-group">
      <label>Crop Year</label>
      <input type="number" [(ngModel)]="userInput.crop_year">
     </div>


    <div class="input-group">

  <label>State</label>

<select [(ngModel)]="userInput.state" name="state">

  <option value="">Select State</option>

  <option *ngFor="let state of states"
          [value]="state">
    {{ state }}
  </option>

</select>

</div>

    <div class="form-row">
      <div class="input-group">
        <label>Area (Hectares)</label>
        <input type="number" placeholder ="Enter Area" [(ngModel)]="userInput.area">
      </div>

      <div class="input-group">
        <label>Production (Quintal)</label>
        <input type="number" placeholder = "Enter Production" [(ngModel)]="userInput.production">
      </div>
    </div>

    <div class="input-group">
      <label>Calculation Method</label>
      <select [(ngModel)]="userInput.method">
        <option value="mean">Mean</option>
        <option value="median">Median</option>
      </select>
    </div>

    <button
      class="predict-btn"
      (click)="makePrediction()"
      [disabled]="
        loading ||
        !userInput.crop ||
        !userInput.season ||
        !userInput.state ||
        !userInput.area ||
        !userInput.production
      ">

      <span *ngIf="!loading">Predict Pattern →</span>
      <span *ngIf="loading">Calculating...</span>

    </button>

    <div
*ngIf="apiResult && !loading"
class="result-panel animate-fade-in">

      <h3>Prediction Result</h3>

      <div class="score-circle">
        {{ apiResult.cropping_pattern_score }}%
      </div>

      <div class="result-grid">
        <div class="result-item">
          <span class="result-label">Score</span>
          <span class="result-value">
            {{ apiResult.cropping_pattern_score }}
          </span>
        </div>

        <div class="result-item">
          <span class="result-label">Status</span>
          <span class="result-value status-badge">
            {{ apiResult.status }}
          </span>
        </div>
      </div>

    </div>

  </div>
</div>
